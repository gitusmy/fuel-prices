name: Fuel Prices

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fuel price scripts
        run: |
          python fuel_prices.py > fuel_prices.json
          python gasoline_prices.py > gasoline_prices.json
          python tolls_fuel_prices_europe.py > tolls_fuel_prices_europe.json
          python tolls_fuel_prices_asia.py > tolls_fuel_prices_asia.json
          python tolls_fuel_prices_america.py > tolls_fuel_prices_america.json

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add fuel_prices.json gasoline_prices.json tolls_fuel_prices_europe.json tolls_fuel_prices_asia.json tolls_fuel_prices_america.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update fuel prices $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
